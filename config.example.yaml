trading:
  symbols:
    - all
  timeframe: 15m
  mode: paper # 'paper' or 'live'
  exchange: bybit
  demo_trading: true
  backtest_limit: 5000
  initial_capital: 100.0
  api_url: "https://api.bybit.com"
  proxy: null  # Optional: "socks5://127.0.0.1:1080" or "http://proxy:8080"
  min_24h_volume: 1000000  # Minimum 24h volume (USDT) to consider a symbol
  max_symbols: 50  # Maximum number of symbols to scan per cycle

strategy:
  rsi_period: 14
  rsi_oversold: 45
  vwap_period: 14
  ema_period: 50
  ema_proximity_pct: 0.015
  require_volume_spike: false
  require_macd: false
  require_ema200: true

risk:
  take_profit_pct: 0.05
  stop_loss_pct: 0.01
  max_capital_per_trade_pct: 0.15 # Max 15% per trade
  daily_loss_limit_pct: 0.02
  max_open_trades: 2
  tp_atr_mult: 3.0
  sl_atr_mult: 1.5
  adaptive_sizing: true
  base_lots: 5
  sized_down_lots: 1

brain:
  enabled: true
  model: "gemini-2.0-flash"
  veto_power: true

# Credentials are loaded from environment variables or .env file.
# See .env.example for the list of required variables.
# You can still put them here as fallback, but .env takes precedence.
credentials:
  api_key: "YOUR_BYBIT_API_KEY"
  api_secret: "YOUR_BYBIT_API_SECRET"
  gemini_api_key: "YOUR_GEMINI_API_KEY"
  telegram_token: "YOUR_TELEGRAM_TOKEN"
  telegram_chat_id: "YOUR_TELEGRAM_CHAT_ID"
  discord_webhook: ""
  dhan_client_id: "YOUR_DHAN_CLIENT_ID"
  dhan_access_token: "YOUR_DHAN_ACCESS_TOKEN"

logging:
  level: INFO
  file: trading_bot.log
  max_bytes: 10485760 # 10MB
  backup_count: 5

stocks:
  symbols:
    - all
  target_dte: 30
  target_delta: -0.25
  spread_width: 50.0
  min_iv_rank: 15.0
  ema_period: 200
  profit_target_pct: 0.40
  stop_loss_mult: 1.5
  max_option_margin_pct: 0.80
  max_capital_per_spread_pct: 0.15
  max_active_spreads: 20
  daily_loss_limit_pct: 0.01
  initial_capital: 20000.0
  lot_size: 50
  adaptive_sizing: true
  base_lots: 10
  sized_down_lots: 1
  delta_hedging:
    enabled: true
    threshold: 100.0
    index_symbol: "^NSEI"
    alert_interval_seconds: 300
